name: Deploy Web App to Cloudflare Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'WebApp/**'
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Backend API Base URL (e.g. https://your-tunnel.trycloudflare.com)'
        required: false
        type: string
        default: ''

jobs:
  deploy-webapp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: WebApp/package-lock.json

      - name: Install dependencies
        working-directory: WebApp
        run: npm ci

      - name: Build Web App
        working-directory: WebApp
        env:
          VITE_API_BASE_URL: ${{ inputs.api_base_url || vars.CLOUDFLARE_TUNNEL_URL || 'http://localhost:5140' }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pho-am-thuc-web
          directory: WebApp/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
